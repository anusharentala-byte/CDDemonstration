name: Deploy Website
on:
  push:
    branches:
      - main
permissions:
  contents: read
  id-token: write
  pages: write
  actions: read
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: 
        name: production
    steps:
      - name: Checkout
        uses: actions/checkout@v3  
      - name: configure git hub pages
        uses: actions/configure-pages@v5
      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
            path : .
      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v4